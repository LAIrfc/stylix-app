<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Transparent background — suitable for AR overlay -->
  <defs>
    <radialGradient id="silverShine" cx="38%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="40%" stop-color="#b0b8c8"/>
      <stop offset="100%" stop-color="#606878"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer ring — slim band -->
  <circle cx="100" cy="100" r="70" fill="url(#silverShine)" filter="url(#glow)"/>
  <!-- Inner cutout — wider gap = thinner band look -->
  <circle cx="100" cy="100" r="57" fill="black"/>
  <!-- Highlight arc -->
  <path d="M 50 72 A 57 57 0 0 1 100 45" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <!-- Secondary sheen -->
  <path d="M 60 55 A 60 60 0 0 1 140 55" stroke="#e8edf5" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <!-- Shadow -->
  <path d="M 150 128 A 57 57 0 0 1 100 155" stroke="#303840" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
</svg>
