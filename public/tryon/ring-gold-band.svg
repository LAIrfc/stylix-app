<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Transparent background — suitable for AR overlay -->
  <defs>
    <radialGradient id="goldShine" cx="38%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#f0d080"/>
      <stop offset="40%" stop-color="#c9a962"/>
      <stop offset="100%" stop-color="#7a5a1e"/>
    </radialGradient>
    <radialGradient id="innerShadow" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.45"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer ring body -->
  <circle cx="100" cy="100" r="72" fill="url(#goldShine)" filter="url(#glow)"/>
  <!-- Inner cutout — makes it look like a ring band -->
  <circle cx="100" cy="100" r="52" fill="black" style="mix-blend-mode:normal"/>
  <!-- Highlight arc top-left -->
  <path d="M 55 68 A 52 52 0 0 1 100 48" stroke="#f8e89a" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Shadow arc bottom-right -->
  <path d="M 145 132 A 52 52 0 0 1 100 152" stroke="#5a3d0a" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Inner ring depth shadow -->
  <circle cx="100" cy="100" r="62" fill="none" stroke="#000000" stroke-width="4" opacity="0.15"/>
  <!-- Sheen line -->
  <path d="M 70 42 A 72 72 0 0 1 130 42" stroke="#fff8dc" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
</svg>
