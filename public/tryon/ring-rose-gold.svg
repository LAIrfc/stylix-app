<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Transparent background — suitable for AR overlay -->
  <defs>
    <radialGradient id="roseShine" cx="38%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#f5c0a0"/>
      <stop offset="40%" stop-color="#d4836a"/>
      <stop offset="100%" stop-color="#8b4a2e"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="70" fill="url(#roseShine)" filter="url(#glow)"/>
  <!-- Inner cutout -->
  <circle cx="100" cy="100" r="52" fill="black"/>
  <!-- Highlight -->
  <path d="M 53 70 A 52 52 0 0 1 100 50" stroke="#fddcc8" stroke-width="3.5" stroke-linecap="round" opacity="0.65"/>
  <!-- Small pavé stone accents on band top -->
  <circle cx="78" cy="48" r="4.5" fill="#ffffff" opacity="0.75"/>
  <circle cx="100" cy="32" r="5.5" fill="#ffffff" opacity="0.85"/>
  <circle cx="122" cy="48" r="4.5" fill="#ffffff" opacity="0.75"/>
  <!-- Stone sparkles -->
  <circle cx="100" cy="32" r="2" fill="#ffffff" opacity="0.95"/>
  <!-- Shadow arc -->
  <path d="M 147 130 A 52 52 0 0 1 100 150" stroke="#5a2510" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
</svg>
